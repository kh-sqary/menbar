<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>محرر الخطب – خطبة</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'theyeer', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .editor-navbar {
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: var(--shadow-sm);
    }

    .editor-container {
      max-width: 1300px;
      width: 100%;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 30px;
      flex: 1;
    }

    @media (max-width: 1000px) {
      .editor-container {
        grid-template-columns: 1fr;
      }
    }

    .main-editor-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
    }

    .editor-field-group {
      margin-bottom: 30px;
    }

    .field-label {
      display: flex;
      align-items: center; gap: 10px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
      font-size: 1.1rem;
    }

    .title-input {
      width: 100%;
      border: none;
      border-bottom: 2px solid var(--border);
      font-size: 2.2rem;
      font-weight: 800;
      padding: 10px 0;
      margin-bottom: 40px;
      color: var(--dark);
      background: transparent;
      outline: none;
      transition: var(--transition);
    }

    .title-input:focus {
      border-color: var(--primary);
    }

    .content-area {
      width: 100%;
      min-height: 150px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px;
      font-size: 1.1rem;
      line-height: 1.8;
      background: var(--bg);
      color: var(--text);
      resize: vertical;
      outline: none;
      transition: var(--transition);
    }

    .content-area:focus {
      border-color: var(--primary);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(95, 168, 211, 0.1);
    }

    .sidebar-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 25px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      position: sticky;
      top: 110px;
      height: fit-content;
    }

    .evidence-item {
      margin-bottom: 20px;
    }

    .evidence-label {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .evidence-area {
      width: 100%;
      min-height: 100px;
      padding: 12px;
      font-size: 0.9rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      outline: none;
      resize: vertical;
    }
    @media (max-width: 768px) {
      .editor-navbar .nav-actions {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--white);
        padding: 15px 20px;
        display: flex;
        justify-content: space-around;
        box-shadow: 0 -4px 16px rgba(0,0,0,0.1);
        z-index: 1001;
        gap: 10px;
      }
      
      .editor-navbar .nav-actions button {
        flex: 1;
        padding: 12px;
        font-size: 0.9rem;
      }

      .editor-navbar .nav-actions .btn-outline {
        margin-right: 0 !important;
      }

      .editor-container {
        padding-bottom: 80px; /* Space for sticky buttons */
      }
    }
  </style>
</head>
<body>

  <nav class="editor-navbar glass-nav">
    <div class="nav-logo" onclick="window.location.href='index.html#overview'" style="cursor:pointer">
      <i class="fas fa-microphone-alt"></i>
      <span>خطبة <small style="font-size: 0.6em; opacity: 0.7;">| المحرر</small></span>
    </div>
    <div class="nav-actions" style="display: flex; align-items: center; gap: 15px;">
      <button id="theme-toggle" class="btn-icon" onclick="toggleDarkMode()" aria-label="تبديل الوضع الداكن"
        style="color: var(--color-text-primary); font-size: 1.25rem; background: none; border: none; cursor: pointer; padding: 5px; display: flex; align-items: center;">
        <i class="fas fa-moon"></i>
      </button>
      <button class="btn-outline" onclick="window.location.href='index.html#overview'">إلغاء</button>
      <button class="btn-primary" onclick="saveKhutbah()"><i class="fas fa-save"></i> حفظ المسودة</button>
    </div>
  </nav>

  <main class="editor-container">
    <div class="main-editor-card">
      <input type="text" id="khutbah-title" class="title-input" placeholder="عنوان الخطبة..." />
      
      <div class="editor-field-group">
        <label class="field-label">
          <span><i class="fas fa-play-circle"></i> المقدمة</span>
          <button class="ai-btn-small" onclick="improveSpeechWithAI('box-intro')" title="تحسين بالذكاء الاصطناعي">
            <i class="fas fa-magic"></i>
          </button>
        </label>
        <textarea id="box-intro" class="content-area" placeholder="ابدأ خطبتك بالاستفتاح والثناء..."></textarea>
      </div>

      <div class="editor-field-group">
        <label class="field-label">
          <span><i class="fas fa-list-ul"></i> عناصر الخطبة</span>
          <button class="ai-btn-small" onclick="improveSpeechWithAI('box-elements')" title="تحسين بالذكاء الاصطناعي">
            <i class="fas fa-magic"></i>
          </button>
        </label>
        <textarea id="box-elements" class="content-area" style="min-height: 100px;" placeholder="حدد العناصر الرئيسية التي ستتحدث عنها..."></textarea>
      </div>

      <div class="editor-field-group">
        <label class="field-label">
          <span><i class="fas fa-paragraph"></i> صلب الموضوع</span>
          <button class="ai-btn-small" onclick="improveSpeechWithAI('box-body')" title="تحسين بالذكاء الاصطناعي">
            <i class="fas fa-magic"></i>
          </button>
        </label>
        <textarea id="box-body" class="content-area" style="min-height: 400px;" placeholder="اشرح العناصر بالتفصيل واستشهد بالأدلة..."></textarea>
      </div>

      <div class="editor-field-group">
        <label class="field-label">
          <span><i class="fas fa-flag-checkered"></i> الخاتمة</span>
          <button class="ai-btn-small" onclick="improveSpeechWithAI('box-conclusion')" title="تحسين بالذكاء الاصطناعي">
            <i class="fas fa-magic"></i>
          </button>
        </label>
        <textarea id="box-conclusion" class="content-area" placeholder="أنهِ خطبتك بالتوصيات والدعاء..."></textarea>
      </div>
    </div>

    <aside class="side-column">
      <div class="sidebar-card">
        <h3 style="margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">صندوق الأدلة <i class="fas fa-quote-right" style="float: left; color: var(--primary);"></i></h3>
        
        <div class="evidence-item">
          <label class="evidence-label"><i class="fas fa-quran" style="color: #66BB6A;"></i> القرآن الكريم</label>
          <textarea id="ev-quran" class="evidence-area" placeholder="أضف الآيات هنا..."></textarea>
        </div>

        <div class="evidence-item">
          <label class="evidence-label"><i class="fas fa-book" style="color: #5FA8D3;"></i> السنة النبوية</label>
          <textarea id="ev-hadith" class="evidence-area" placeholder="أضف الأحاديث هنا..."></textarea>
        </div>

        <div class="evidence-item">
          <label class="evidence-label"><i class="fas fa-pen-nib" style="color: #FF8C69;"></i> الشعر والحكم</label>
          <textarea id="ev-poetry" class="evidence-area" placeholder="أبيات شعرية أو حكم..."></textarea>
        </div>

        <button class="btn-primary btn-full" style="width: 100%; margin-top: 10px;" onclick="generateAIEvidence()">
          <i class="fas fa-magic"></i> اقتراح أدلة بالذكاء الاصطناعي
        </button>

        <button class="btn-outline btn-full" style="width: 100%; margin-top: 20px;" onclick="window.location.href='khutbah-view.html'">
          <i class="fas fa-eye"></i> استعراض كخطبة
        </button>
      </div>
    </aside>
  </main>

  <script>
    // System Integration
    document.addEventListener("DOMContentLoaded", () => {
      // Dark Mode sync
      if (localStorage.getItem('theme') === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
      }

      // Check for pending library content
      const types = ['quran', 'hadith', 'poetry'];
      types.forEach(t => {
        const val = localStorage.getItem(`pending_${t}`);
        if(val) {
          document.getElementById(`ev-${t}`).value = val;
          localStorage.removeItem(`pending_${t}`);
        }
      });

      // Load saved document
      const saved = localStorage.getItem('current_khutbah');
      if (saved) {
        try {
          const data = JSON.parse(saved);
          document.getElementById('khutbah-title').value = data.title || '';
          document.getElementById('box-intro').value = data.intro || '';
          document.getElementById('box-elements').value = data.elements || '';
          document.getElementById('box-body').value = data.body || '';
          document.getElementById('box-conclusion').value = data.conclusion || '';
          if (!document.getElementById('ev-quran').value) document.getElementById('ev-quran').value = data.quran || '';
          if (!document.getElementById('ev-hadith').value) document.getElementById('ev-hadith').value = data.hadith || '';
          if (!document.getElementById('ev-poetry').value) document.getElementById('ev-poetry').value = data.poetry || '';
        } catch(e) { console.error("Error loading khutbah", e); }
      }
    });

    function saveKhutbah() {
      const data = {
        title: document.getElementById('khutbah-title').value,
        intro: document.getElementById('box-intro').value,
        elements: document.getElementById('box-elements').value,
        body: document.getElementById('box-body').value,
        conclusion: document.getElementById('box-conclusion').value,
        quran: document.getElementById('ev-quran').value,
        hadith: document.getElementById('ev-hadith').value,
        poetry: document.getElementById('ev-poetry').value,
        updatedAt: new Date().toISOString()
      };

      localStorage.setItem('current_khutbah', JSON.stringify(data));
      
      // Feedback
      const btn = document.querySelector('.btn-primary');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-check"></i> تم الحفظ';
      btn.style.background = '#66BB6A';
      
      setTimeout(() => {
        btn.innerHTML = originalText;
        btn.style.background = '';
      }, 2000);
    }

    async function generateAIEvidence() {
      const title = document.getElementById('khutbah-title').value || "موضوع دعوي";
      const btn = document.querySelector('[onclick="generateAIEvidence()"]');
      const originalText = btn.innerHTML;
      
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري اقتراح أدلة...';
      btn.disabled = true;

      try {
        // We use common prompt to get structured evidences
        const res = await fetch('/api/improve-speech', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            text: "يرجى اقتراح: 1. آية قرآنية 2. حديث نبوي 3. بيت شعر، لمخاطبة الناس في هذا الموضوع.", 
            topic: title 
          })
        });
        const data = await res.json();
        
        if (data.improved) {
          // Add to Body or show toast (simplified for now: just alert with results)
          showToast("تم اقتراح أدلة جديدة! يمكنك مراجعة صلب الموضوع أو نسخها.", "success");
          // Optionally append to textarea or separate field
          document.getElementById('box-body').value += "\n\n--- أدلة مقترحة ---\n" + data.improved;
        } else {
          showToast("لم نتمكن من العثور على أدلة حالياً.", "error");
        }
      } catch (err) {
        showToast("فشل الاتصال بخدمة الذكاء الاصطناعي.", "error");
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
        // Use window.opener to call showToast if possible, or just alert/style it
        alert("تم استخراج الأدلة المناسبة لموضوع الخطبة بنجاح ✨");
      }, 1500);
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
