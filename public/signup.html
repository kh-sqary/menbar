<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد – منصة خطبة</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }
        .login-logo {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 20px;
        }
        h2 { margin-bottom: 25px; color: var(--dark); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { text-align: right; margin-bottom: 15px; }
        .form-group.full { grid-column: span 2; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 700; font-size: 0.9rem; }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            outline: none;
        }
        .login-footer { margin-top: 25px; font-size: 0.9rem; color: var(--text-light); }
        .login-footer a { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo"><i class="fas fa-microphone-alt"></i> خطبة</div>
        <h2>إنشاء حساب جديد</h2>
        <form onsubmit="handleSignup(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label>الاسم الأول</label>
                    <input type="text" required placeholder="أحمد">
                </div>
                <div class="form-group">
                    <label>اسم العائلة</label>
                    <input type="text" required placeholder="العمري">
                </div>
                <div class="form-group full">
                    <label>البريد الإلكتروني</label>
                    <input type="email" required placeholder="example@domain.com">
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" required placeholder="********">
                </div>
                <div class="form-group">
                    <label>تأكيد كلمة المرور</label>
                    <input type="password" required placeholder="********">
                </div>
            </div>
            <button type="submit" class="btn-primary btn-full" style="width: 100%; padding: 14px; margin-top: 10px;">إنشاء حساب</button>
        </form>
        <div class="login-footer">
            لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
        </div>
    </div>

    <script>
        function handleSignup(event) {
            event.preventDefault();
            // Mock Auth
            localStorage.setItem('minbar_auth', 'true');
            window.location.href = 'index.html#overview';
        }
    </script>
</body>
</html>
