<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول – منصة خطبة</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }
        .login-logo {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 30px;
        }
        h2 { margin-bottom: 30px; color: var(--dark); }
        .form-group { text-align: right; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            outline: none;
        }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(95, 168, 211, 0.1); }
        .login-footer { margin-top: 30px; font-size: 0.9rem; color: var(--text-light); }
        .login-footer a { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo"><i class="fas fa-microphone-alt"></i> خطبة</div>
        <h2>تسجيل الدخول</h2>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" required placeholder="example@domain.com">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" required placeholder="********">
            </div>
            <button type="submit" class="btn-primary btn-full" style="width: 100%; padding: 14px;">دخول</button>
        </form>
        <div class="login-footer">
            ليس لديك حساب؟ <a href="signup.html">إنشاء حساب جديد</a>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            // Mock Auth
            localStorage.setItem('minbar_auth', 'true');
            window.location.href = 'index.html#overview';
        }
    </script>
</body>
</html>
